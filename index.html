<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личное Дело — Генератор Досье Персонажа</title>
    <meta name="description" content="Создайте стилизованное личное дело для вашего персонажа: военное досье СССР, Рейха, США, лист D&D или Call of Cthulhu. Экспорт в PDF.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Special+Elite&family=UnifrakturMaguntia&family=Old+Standard+TT:wght@400;700&family=Courier+Prime:wght@400;700&family=Playfair+Display:wght@400;700;900&family=MedievalSharp&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/selector.css">
    <link rel="stylesheet" href="css/editor.css">
    <link rel="stylesheet" href="css/templates/soviet.css">
    <link rel="stylesheet" href="css/templates/reich.css">
    <link rel="stylesheet" href="css/templates/american.css">
</head>
<body>
    <!-- STYLE SELECTOR SCREEN -->
    <div id="selector-screen" class="screen active">
        <div class="selector-bg"></div>
        <div class="selector-content">
            <header class="selector-header">
                <h1 class="selector-title">ЛИЧНОЕ ДЕЛО</h1>
                <p class="selector-subtitle">Генератор досье персонажа</p>
            </header>
            <div class="cards-grid" id="style-cards">
                <!-- Cards injected by JS -->
            </div>
        </div>
    </div>

    <!-- EDITOR SCREEN -->
    <div id="editor-screen" class="screen">
        <div class="editor-toolbar">
            <button id="btn-back" class="toolbar-btn" title="Назад к выбору стиля">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                <span>Назад</span>
            </button>
            <div class="toolbar-title" id="toolbar-title">Досье</div>
            <div class="toolbar-actions">
                <button id="btn-import-json" class="toolbar-btn" title="Загрузить JSON">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    <span>Загрузить</span>
                </button>
                <input type="file" id="input-import-json" accept=".json" style="display: none;">
                <button id="btn-export-json" class="toolbar-btn" title="Скачать JSON">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    <span>Скачать</span>
                </button>
                <button id="btn-save" class="toolbar-btn" title="Сохранить в браузере">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17,21 17,13 7,13 7,21"/><polyline points="7,3 7,8 15,8"/></svg>
                    <span>Сохранить</span>
                </button>
                <button id="btn-export" class="toolbar-btn primary" title="Экспорт в PDF">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10,9 9,9 8,9"/></svg>
                    <span>PDF</span>
                </button>
            </div>
        </div>
        <div class="editor-layout">
            <aside class="editor-sidebar" id="editor-sidebar">
                <div class="sidebar-scroll">
                    <form id="editor-form">
                        <!-- Form fields injected by JS -->
                    </form>
                </div>
            </aside>
            <main class="editor-preview" id="editor-preview">
                <div class="preview-container" id="preview-container">
                    <!-- A4 pages rendered here -->
                </div>
            </main>
        </div>
    </div>

    <!-- PDF rendering area (hidden) -->
    <div id="pdf-render-area" style="position:absolute;left:-9999px;top:0;"></div>

    <!-- Loading overlay -->
    <div id="loading-overlay" class="loading-overlay hidden">
        <div class="loading-spinner"></div>
        <p class="loading-text">Генерация PDF...</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="js/templates/soviet.js"></script>
    <script src="js/templates/reich.js"></script>
    <script src="js/templates/american.js"></script>
    <script src="js/editor.js"></script>
    <script src="js/pdf-export.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
